<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Before and after comparison</title>
  <desc id="desc">Illustrative comparison showing background apps before and after Smart Background Nap.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf3f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="72" y="74" fill="#15202b" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">A quieter background, without closing apps</text>
  <text x="72" y="108" fill="#5c6b78" font-family="Segoe UI, Arial, sans-serif" font-size="18">Illustrative view. Real results depend on workload, hardware, Windows version, and app behavior.</text>
  <g transform="translate(72 150)">
    <rect width="500" height="300" rx="18" fill="#ffffff" stroke="#d7e0e7"/>
    <text x="34" y="48" fill="#1f2933" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Before</text>
    <text x="34" y="78" fill="#657482" font-family="Segoe UI, Arial, sans-serif" font-size="15">Background apps can keep competing for attention.</text>
    <g transform="translate(34 122)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Scheduler pressure</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="305" height="16" rx="8" fill="#ef6f6c"/>
      <text x="410" y="29" fill="#8a3a39" font-family="Segoe UI, Arial, sans-serif" font-size="15">high</text>
    </g>
    <g transform="translate(34 184)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">RAM footprint pressure</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="280" height="16" rx="8" fill="#f0b45b"/>
      <text x="410" y="29" fill="#8a5b16" font-family="Segoe UI, Arial, sans-serif" font-size="15">busy</text>
    </g>
    <g transform="translate(34 246)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Background wakeups</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="330" height="16" rx="8" fill="#8b7cf6"/>
      <text x="410" y="29" fill="#5645b5" font-family="Segoe UI, Arial, sans-serif" font-size="15">noisy</text>
    </g>
  </g>
  <g transform="translate(628 150)">
    <rect width="500" height="300" rx="18" fill="#ffffff" stroke="#d7e0e7"/>
    <text x="34" y="48" fill="#1f2933" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">After Smart Background Nap</text>
    <text x="34" y="78" fill="#657482" font-family="Segoe UI, Arial, sans-serif" font-size="15">Safe background apps are moved into a softer profile.</text>
    <g transform="translate(34 122)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Scheduler pressure</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="142" height="16" rx="8" fill="#36b37e"/>
      <text x="410" y="29" fill="#1d6f50" font-family="Segoe UI, Arial, sans-serif" font-size="15">lower</text>
    </g>
    <g transform="translate(34 184)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">RAM footprint pressure</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="168" height="16" rx="8" fill="#3b82f6"/>
      <text x="410" y="29" fill="#1d4f91" font-family="Segoe UI, Arial, sans-serif" font-size="15">lighter</text>
    </g>
    <g transform="translate(34 246)">
      <text x="0" y="0" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Background wakeups</text>
      <rect x="0" y="14" width="390" height="16" rx="8" fill="#e7edf3"/>
      <rect x="0" y="14" width="128" height="16" rx="8" fill="#14b8a6"/>
      <text x="410" y="29" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="15">quieter</text>
    </g>
  </g>
</svg>
