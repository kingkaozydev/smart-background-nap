<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Smart Background Nap before and after</title>
  <desc id="desc">Comparison showing noisy background apps before and adaptive nap tiers after Smart Background Nap runs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="1" stop-color="#0a1422"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ee184"/>
      <stop offset="1" stop-color="#4b93ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="74" y="74" fill="#f4f7fb" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">Before / After</text>
  <text x="74" y="106" fill="#a7b6c9" font-family="Segoe UI, Arial, sans-serif" font-size="16">Smart Background Nap keeps apps open while lowering safe background pressure.</text>
  <g filter="url(#shadow)">
    <rect x="74" y="140" width="500" height="300" rx="20" fill="#101824" stroke="#3b2f32"/>
    <text x="104" y="184" fill="#ff7b85" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">Before</text>
    <text x="104" y="213" fill="#a7b6c9" font-family="Segoe UI, Arial, sans-serif" font-size="14">Background apps compete with what you are doing now.</text>
    <g transform="translate(104 250)">
      <rect width="410" height="34" rx="9" fill="#1a2230" stroke="#322c34"/>
      <text x="14" y="23" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Browser tabs</text>
      <rect x="150" y="11" width="218" height="12" rx="6" fill="#3b2530"/>
      <rect x="150" y="11" width="182" height="12" rx="6" fill="#ff6674"/>
      <rect y="50" width="410" height="34" rx="9" fill="#1a2230" stroke="#322c34"/>
      <text x="14" y="73" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Chat / launchers</text>
      <rect x="150" y="61" width="218" height="12" rx="6" fill="#3b2530"/>
      <rect x="150" y="61" width="146" height="12" rx="6" fill="#ff6674"/>
      <rect y="100" width="410" height="34" rx="9" fill="#1a2230" stroke="#322c34"/>
      <text x="14" y="123" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Helper processes</text>
      <rect x="150" y="111" width="218" height="12" rx="6" fill="#3b2530"/>
      <rect x="150" y="111" width="168" height="12" rx="6" fill="#ff6674"/>
    </g>
    <rect x="626" y="140" width="500" height="300" rx="20" fill="#101d30" stroke="#263a55"/>
    <text x="656" y="184" fill="#2ee184" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">After</text>
    <text x="656" y="213" fill="#a7b6c9" font-family="Segoe UI, Arial, sans-serif" font-size="14">Adaptive tiers lower background pressure while foreground wake stays ready.</text>
    <g transform="translate(656 250)">
      <rect width="410" height="34" rx="9" fill="#0a1728" stroke="#223650"/>
      <text x="14" y="23" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Light nap</text>
      <rect x="150" y="11" width="218" height="12" rx="6" fill="#152338"/>
      <rect x="150" y="11" width="90" height="12" rx="6" fill="url(#good)"/>
      <rect x="378" y="7" width="52" height="20" rx="6" fill="#0c3225" stroke="#176649"/>
      <text x="390" y="21" fill="#2ee184" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="900">P OK</text>
      <rect y="50" width="410" height="34" rx="9" fill="#0a1728" stroke="#223650"/>
      <text x="14" y="73" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Balanced nap</text>
      <rect x="150" y="61" width="218" height="12" rx="6" fill="#152338"/>
      <rect x="150" y="61" width="116" height="12" rx="6" fill="url(#good)"/>
      <rect x="378" y="57" width="52" height="20" rx="6" fill="#0c3225" stroke="#176649"/>
      <text x="390" y="71" fill="#2ee184" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="900">M OK</text>
      <rect y="100" width="410" height="34" rx="9" fill="#0a1728" stroke="#223650"/>
      <text x="14" y="123" fill="#dce8f8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Deep nap</text>
      <rect x="150" y="111" width="218" height="12" rx="6" fill="#152338"/>
      <rect x="150" y="111" width="64" height="12" rx="6" fill="url(#good)"/>
      <rect x="378" y="107" width="52" height="20" rx="6" fill="#2a2113" stroke="#6b5223"/>
      <text x="390" y="121" fill="#ffa629" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="900">T OK</text>
    </g>
  </g>
</svg>
