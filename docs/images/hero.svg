<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Smart Background Nap overview</title>
  <desc id="desc">A polished product banner for Smart Background Nap showing a Windows tray helper that quiets background apps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121417"/>
      <stop offset="0.52" stop-color="#18201d"/>
      <stop offset="1" stop-color="#10151d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20252b"/>
      <stop offset="1" stop-color="#15191f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cffa3"/>
      <stop offset="1" stop-color="#65a7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <path d="M0 338 C170 292 267 390 430 343 C570 303 654 242 824 294 C982 342 1054 280 1200 242 L1200 420 L0 420 Z" fill="#1b2d27" opacity="0.72"/>
  <g filter="url(#shadow)">
    <rect x="74" y="70" width="512" height="280" rx="18" fill="url(#card)" stroke="#303942"/>
    <rect x="105" y="101" width="56" height="56" rx="16" fill="#11161c" stroke="#2d3740"/>
    <path d="M133 116 C149 126 149 144 133 154 C117 144 117 126 133 116 Z" fill="url(#accent)"/>
    <circle cx="133" cy="135" r="5" fill="#11161c"/>
    <text x="185" y="124" fill="#f5f7fa" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Smart Background Nap</text>
    <text x="185" y="158" fill="#b5c0cc" font-family="Segoe UI, Arial, sans-serif" font-size="18">Keep your apps open. Let Windows breathe.</text>
    <g transform="translate(105 206)">
      <rect width="130" height="72" rx="12" fill="#11161c" stroke="#2f3942"/>
      <text x="20" y="30" fill="#99a8b5" font-family="Segoe UI, Arial, sans-serif" font-size="13">background CPU</text>
      <rect x="20" y="46" width="84" height="8" rx="4" fill="#3a4550"/>
      <rect x="20" y="46" width="38" height="8" rx="4" fill="#7cffa3"/>
    </g>
    <g transform="translate(255 206)">
      <rect width="130" height="72" rx="12" fill="#11161c" stroke="#2f3942"/>
      <text x="20" y="30" fill="#99a8b5" font-family="Segoe UI, Arial, sans-serif" font-size="13">RAM pressure</text>
      <rect x="20" y="46" width="84" height="8" rx="4" fill="#3a4550"/>
      <rect x="20" y="46" width="44" height="8" rx="4" fill="#65a7ff"/>
    </g>
    <g transform="translate(405 206)">
      <rect width="130" height="72" rx="12" fill="#11161c" stroke="#2f3942"/>
      <text x="20" y="30" fill="#99a8b5" font-family="Segoe UI, Arial, sans-serif" font-size="13">foreground</text>
      <text x="20" y="55" fill="#f5f7fa" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">protected</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="650" y="78" width="418" height="264" rx="18" fill="#12171d" stroke="#303942"/>
    <rect x="684" y="112" width="350" height="48" rx="12" fill="#1f262e"/>
    <circle cx="712" cy="136" r="9" fill="#7cffa3"/>
    <text x="735" y="142" fill="#edf2f7" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Apply a quiet background profile</text>
    <rect x="684" y="180" width="350" height="48" rx="12" fill="#1f262e"/>
    <circle cx="712" cy="204" r="9" fill="#65a7ff"/>
    <text x="735" y="210" fill="#edf2f7" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Leave active work untouched</text>
    <rect x="684" y="248" width="350" height="48" rx="12" fill="#1f262e"/>
    <circle cx="712" cy="272" r="9" fill="#ffc857"/>
    <text x="735" y="278" fill="#edf2f7" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Run automatically, then exit</text>
  </g>
