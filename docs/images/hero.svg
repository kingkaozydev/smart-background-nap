<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Smart Background Nap overview</title>
  <desc id="desc">Dark product banner showing the Smart Background Nap engine, WebView2 dashboard, and lightweight background optimization.</desc>
